apiVersion: v1
kind: Service
metadata:
  name: flux-operator-web-lb
  namespace: flux-system
  annotations:
    io.cilium/lb-ipam-ips: 192.168.100.202
spec:
  selector:
    app.kubernetes.io/name: flux-operator
    app.kubernetes.io/instance: flux-operator
  ports:
    - name: http-web
      port: 80
      targetPort: 9080
      protocol: TCP
  type: LoadBalancer
  externalTrafficPolicy: Cluster
