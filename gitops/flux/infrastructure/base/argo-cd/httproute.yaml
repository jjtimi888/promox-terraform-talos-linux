apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-cd-route
  namespace: argocd
spec:
  parentRefs:
    - name: shared-gateway
      namespace: kube-system
  hostnames:
    - "argocd.homelab.local"
  rules:
    - backendRefs:
        - name: argo-cd-argocd-server
          port: 80
