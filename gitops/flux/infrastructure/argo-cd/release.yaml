apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-cd
  namespace: argocd
spec:
  interval: 1h
  chart:
    spec:
      chart: argo-cd
      version: 10.1.2
      sourceRef:
        kind: HelmRepository
        name: argo-cd
        namespace: argocd
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    configs:
      params:
        server.insecure: "true"
