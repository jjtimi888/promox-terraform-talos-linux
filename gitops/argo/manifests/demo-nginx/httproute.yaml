apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-nginx-route
  namespace: demo-nginx
spec:
  parentRefs:
    - name: shared-gateway
      namespace: kube-system
  hostnames:
    - "nginx.homelab.local"
  rules:
    - backendRefs:
        - name: demo-nginx
          port: 80
