apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/jjtimi888/promox-terraform-talos-linux.git'
    targetRevision: main
    path: gitops/argo/manifests/demo-nginx
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
